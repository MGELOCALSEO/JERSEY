<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="topArc2" d="M 100 320 A 200 200 0 0 1 500 320" fill="none"/>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d391"/>
      <stop offset="100%" stop-color="#1fae72"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="300" cy="300" r="270" fill="#0a0f1a" stroke="url(#goldGrad2)" stroke-width="6"/>
  <circle cx="300" cy="300" r="250" fill="none" stroke="url(#goldGrad2)" stroke-width="2"/>

  <!-- Inner shield -->
  <path d="M 300 95
           L 425 135
           L 425 315
           C 425 415 365 475 300 505
           C 235 475 175 415 175 315
           L 175 135
           Z"
        fill="#0e1421" stroke="url(#goldGrad2)" stroke-width="5"/>

  <!-- Curved brand text -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="url(#goldGrad2)" letter-spacing="5" font-weight="bold">
    <textPath href="#topArc2" startOffset="50%" text-anchor="middle">MAKELELE JERSEY</textPath>
  </text>

  <!-- Small star above monogram -->
  <path d="M 300 165 l 6 14 15 2 -11 10 3 15 -13 -7 -13 7 3 -15 -11 -10 15 -2 z" fill="url(#goldGrad2)"/>

  <!-- MJS Monogram -->
  <text x="300" y="345" font-family="Georgia, 'Times New Roman', serif" font-size="130" font-weight="bold"
        fill="#f5f5f0" stroke="url(#goldGrad2)" stroke-width="2" text-anchor="middle">MJS</text>

  <!-- Ball accents flanking monogram -->
  <g transform="translate(215,350)">
    <circle r="14" fill="#f5f5f0" stroke="#0e1421" stroke-width="2"/>
    <polygon points="0,-6 4,-2 2,3 -2,3 -4,-2" fill="#0e1421"/>
  </g>
  <g transform="translate(385,350)">
    <circle r="14" fill="#f5f5f0" stroke="#0e1421" stroke-width="2"/>
    <polygon points="0,-6 4,-2 2,3 -2,3 -4,-2" fill="#0e1421"/>
  </g>

  <!-- Laurel flourish -->
  <g stroke="url(#goldGrad2)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M 250 430 C 230 450 225 475 240 495"/>
    <path d="M 350 430 C 370 450 375 475 360 495"/>
  </g>

  <text x="300" y="480" font-family="Georgia, serif" font-size="16" fill="url(#goldGrad2)" text-anchor="middle" letter-spacing="3">EST. 2026</text>
</svg>
